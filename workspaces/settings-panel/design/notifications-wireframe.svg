<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1440" height="900" fill="#F9FAFB"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1440" height="64" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="24" y="38" font-size="16" font-weight="bold" fill="#374151">AppShell — top bar</text>
  <rect x="1350" y="16" width="66" height="32" rx="16" fill="#E5E7EB"/>
  <text x="1383" y="36" font-size="12" text-anchor="middle" fill="#6B7280">JD</text>

  <!-- Tabs nav -->
  <rect x="0" y="64" width="1440" height="48" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="24" y="93" font-size="13" fill="#374151">Tabs (line) —</text>
  <rect x="140" y="72" width="80" height="32" rx="4" fill="none" stroke="#D1D5DB" stroke-width="1"/>
  <text x="180" y="92" font-size="13" text-anchor="middle" fill="#6B7280">Profile</text>
  <rect x="228" y="72" width="120" height="32" rx="4" fill="#3B82F6"/>
  <text x="288" y="92" font-size="13" text-anchor="middle" fill="#FFFFFF" font-weight="bold">Notifications</text>
  <rect x="356" y="72" width="80" height="32" rx="4" fill="none" stroke="#D1D5DB" stroke-width="1"/>
  <text x="396" y="92" font-size="13" text-anchor="middle" fill="#6B7280">Security</text>

  <!-- Section header -->
  <text x="320" y="168" font-size="18" font-weight="bold" fill="#111827">Notification Preferences</text>

  <!-- Card 1: Task notifications -->
  <rect x="320" y="188" width="800" height="200" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow1)"/>
  <!-- Card header -->
  <rect x="320" y="188" width="800" height="40" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="336" y="212" font-size="12" font-weight="bold" fill="#6B7280" letter-spacing="0.05em">TASK NOTIFICATIONS</text>
  <!-- Card rows -->
  <text x="336" y="248" font-size="13" fill="#111827">Task assigned to me</text>
  <text x="336" y="264" font-size="11" fill="#9CA3AF">When a task is assigned to you</text>
  <rect x="1062" y="236" width="42" height="24" rx="12" fill="#3B82F6"/>
  <circle cx="1092" cy="248" r="10" fill="#FFFFFF"/>

  <line x1="320" y1="283" x2="1120" y2="283" stroke="#E5E7EB" stroke-width="1"/>
  <text x="336" y="302" font-size="13" fill="#111827">Task due soon</text>
  <text x="336" y="318" font-size="11" fill="#9CA3AF">24 hours before a task is due</text>
  <rect x="1062" y="290" width="42" height="24" rx="12" fill="#3B82F6"/>
  <circle cx="1092" cy="302" r="10" fill="#FFFFFF"/>

  <line x1="320" y1="337" x2="1120" y2="337" stroke="#E5E7EB" stroke-width="1"/>
  <text x="336" y="356" font-size="13" fill="#111827">Mentions</text>
  <text x="336" y="372" font-size="11" fill="#9CA3AF">When someone @mentions you</text>
  <rect x="1062" y="344" width="42" height="24" rx="12" fill="#3B82F6"/>
  <circle cx="1092" cy="356" r="10" fill="#FFFFFF"/>

  <!-- Card 2: Product updates -->
  <rect x="320" y="404" width="800" height="148" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Card header -->
  <rect x="320" y="404" width="800" height="40" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="336" y="428" font-size="12" font-weight="bold" fill="#6B7280" letter-spacing="0.05em">UPDATES &amp; ALERTS</text>
  <!-- Row 1: Product Updates -->
  <text x="336" y="462" font-size="13" fill="#111827">Product Updates</text>
  <text x="336" y="478" font-size="11" fill="#9CA3AF">New features and improvements</text>
  <rect x="1062" y="450" width="42" height="24" rx="12" fill="#3B82F6"/>
  <circle cx="1092" cy="462" r="10" fill="#FFFFFF"/>

  <line x1="320" y1="497" x2="1120" y2="497" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Row 2: Security Alerts (disabled) -->
  <text x="336" y="516" font-size="13" fill="#6B7280">Security Alerts</text>
  <text x="336" y="532" font-size="11" fill="#9CA3AF">Always enabled for your safety</text>
  <rect x="990" y="504" width="62" height="22" rx="4" fill="#E5E7EB"/>
  <text x="1021" y="519" font-size="10" text-anchor="middle" fill="#6B7280">Required</text>
  <rect x="1062" y="504" width="42" height="24" rx="12" fill="#D1D5DB"/>
  <circle cx="1092" cy="516" r="10" fill="#FFFFFF"/>

  <!-- Shadow filter -->
  <defs>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="720" y="878" font-size="12" text-anchor="middle" fill="#9CA3AF">Screen: settings/notifications  |  Chakra UI v3  |  Stage: wireframe</text>
</svg>

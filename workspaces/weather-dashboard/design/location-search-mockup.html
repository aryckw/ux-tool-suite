<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Location Search — Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#2563EB',
              surface: '#FFFFFF',
              error: '#DC2626',
              neutral: {
                50:  '#FAFAFA',
                100: '#F5F5F5',
                200: '#E5E5E5',
                300: '#D4D4D4',
                400: '#A3A3A3',
                500: '#737373',
                600: '#525252',
                700: '#404040',
                800: '#262626',
                900: '#171717',
              },
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      function filterResults() {
        const query = document.getElementById('search-input').value.toLowerCase().trim()
        const cards = document.querySelectorAll('.result-card')
        const emptyState = document.getElementById('empty-state')
        const resultsList = document.getElementById('results-list')

        let anyVisible = false
        cards.forEach(card => {
          const text = card.dataset.city.toLowerCase()
          if (query && text.includes(query)) {
            card.style.display = ''
            anyVisible = true
          } else {
            card.style.display = 'none'
          }
        })

        if (query === '') {
          resultsList.style.display = 'none'
          emptyState.style.display = 'none'
        } else if (anyVisible) {
          resultsList.style.display = ''
          emptyState.style.display = 'none'
        } else {
          resultsList.style.display = 'none'
          emptyState.style.display = ''
          document.getElementById('empty-query').textContent = query
        }
      }

      function selectCity(cityName) {
        const confirmation = document.getElementById('selected-confirmation')
        document.getElementById('selected-city').textContent = cityName
        confirmation.style.display = ''
      }
    </script>
  </head>
  <body class="min-h-screen bg-neutral-100 font-sans flex flex-col items-center pt-20 px-6">

    <!-- Back button -->
    <div class="w-full max-w-2xl mb-6">
      <a href="#" class="inline-flex items-center gap-2 text-sm text-neutral-500 hover:text-neutral-900 transition-colors">
        <span>&#8592;</span> Back to Dashboard
      </a>
    </div>

    <div class="w-full max-w-2xl">
      <h1 class="text-2xl font-bold text-neutral-900 mb-8 text-center">Search for a Location</h1>

      <!-- Search input -->
      <input
        id="search-input"
        type="text"
        autofocus
        oninput="filterResults()"
        placeholder="Search for a city..."
        class="w-full px-5 py-4 text-base rounded-xl border-2 border-neutral-200 bg-surface text-neutral-900 placeholder-neutral-400 focus:outline-none focus:border-primary transition-colors shadow-sm"
        aria-label="Search for a city"
        autocomplete="off"
      />

      <!-- Results list -->
      <div id="results-list" style="display: none;" class="mt-3 flex flex-col gap-3">
        <div class="result-card bg-surface rounded-xl shadow-sm border-2 border-transparent hover:border-primary transition-colors px-5 py-4 flex justify-between items-center cursor-pointer" data-city="london uk" onclick="selectCity('London, UK')">
          <div>
            <div class="font-semibold text-neutral-900">London, UK</div>
            <div class="text-sm text-neutral-400 mt-0.5">51.5074°, -0.1278°</div>
          </div>
          <button
            aria-label="Select London"
            class="px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
            Select
          </button>
        </div>

        <div class="result-card bg-surface rounded-xl shadow-sm border-2 border-transparent hover:border-primary transition-colors px-5 py-4 flex justify-between items-center cursor-pointer" data-city="new york us" onclick="selectCity('New York, US')">
          <div>
            <div class="font-semibold text-neutral-900">New York, US</div>
            <div class="text-sm text-neutral-400 mt-0.5">40.7128°, -74.0060°</div>
          </div>
          <button
            aria-label="Select New York"
            class="px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
            Select
          </button>
        </div>

        <div class="result-card bg-surface rounded-xl shadow-sm border-2 border-transparent hover:border-primary transition-colors px-5 py-4 flex justify-between items-center cursor-pointer" data-city="tokyo jp" onclick="selectCity('Tokyo, JP')">
          <div>
            <div class="font-semibold text-neutral-900">Tokyo, JP</div>
            <div class="text-sm text-neutral-400 mt-0.5">35.6762°, 139.6503°</div>
          </div>
          <button
            aria-label="Select Tokyo"
            class="px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
            Select
          </button>
        </div>

        <div class="result-card bg-surface rounded-xl shadow-sm border-2 border-transparent hover:border-primary transition-colors px-5 py-4 flex justify-between items-center cursor-pointer" data-city="sydney au" onclick="selectCity('Sydney, AU')">
          <div>
            <div class="font-semibold text-neutral-900">Sydney, AU</div>
            <div class="text-sm text-neutral-400 mt-0.5">-33.8688°, 151.2093°</div>
          </div>
          <button
            aria-label="Select Sydney"
            class="px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
            Select
          </button>
        </div>

        <div class="result-card bg-surface rounded-xl shadow-sm border-2 border-transparent hover:border-primary transition-colors px-5 py-4 flex justify-between items-center cursor-pointer" data-city="paris fr" onclick="selectCity('Paris, FR')">
          <div>
            <div class="font-semibold text-neutral-900">Paris, FR</div>
            <div class="text-sm text-neutral-400 mt-0.5">48.8566°, 2.3522°</div>
          </div>
          <button
            aria-label="Select Paris"
            class="px-4 py-2 bg-primary text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
            Select
          </button>
        </div>
      </div>

      <!-- Empty state -->
      <div id="empty-state" style="display: none;" class="mt-12 text-center text-neutral-400">
        <div class="text-4xl mb-3">🔍</div>
        <div class="font-semibold text-neutral-500">No results for "<span id="empty-query"></span>"</div>
        <div class="text-sm mt-2">Try a different city name.</div>
      </div>

      <!-- Selected confirmation -->
      <div id="selected-confirmation" style="display: none;" class="mt-4 px-4 py-3 bg-blue-50 border-l-4 border-primary rounded-lg text-blue-700 text-sm">
        Selected: <strong id="selected-city"></strong>
      </div>
    </div>
  </body>
</html>
